<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tasks</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="title">TASK_MANAGER</div>

<nav>
<a href="index.html">DASHBOARD</a>
<a href="tasks.html">TASKS</a>
<a href="calendar.html">CALENDAR</a>
<a href="stats.html">STATS</a>
</nav>

<div class="controls">
<button class="gear-icon" id="gearIcon"></button>
<div id="clock"></div>
</div>

<!-- Settings Popout Menu -->
<div id="settingsMenu" class="settings-menu">
<div class="settings-content">
<h3>Settings</h3>
<button id="themeToggle">TOGGLE DARK MODE</button>
</div>
</div>

</header>

<main>

<section class="add-task">
<button id="addTask">ADD TASK</button>
</section>

<section id="taskList" class="tasks"></section>

<!-- Edit Task Modal -->
<div id="editModal" class="modal">
<div class="modal-content">
<h2>Edit Task</h2>
<form id="editForm">
<label for="editName">Task Name:</label>
<input type="text" id="editName" required>

<label for="editSubject">Subject:</label>
<select id="editSubject">
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>History</option>
<option>General</option>
</select>

<label for="editDescription">Description (optional):</label>
<textarea id="editDescription" rows="3"></textarea>

<label for="editDeadline">Deadline:</label>
<div class="deadline-inputs">
<input type="date" id="editDeadlineDate" required>
<input type="time" id="editDeadlineTime" required>
</div>

<div class="advanced-toggle">
<span class="arrow">▶</span>
<span>Advanced Options</span>
</div>

<div class="advanced-section" id="advancedSection">
<label for="editStartDate">Start Date:</label>
<div class="deadline-inputs">
<input type="date" id="editStartDateDate">
<input type="time" id="editStartTime">
</div>
</div>

<div class="modal-actions">
<button type="button" id="cancelEdit">CANCEL</button>
<button type="submit">SAVE CHANGES</button>
</div>
</form>
</div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
<div class="modal-content">
<h2>Delete Task</h2>
<p>Are you sure you want to delete this task?</p>
<p><strong id="deleteTaskName"></strong></p>
<form id="deleteForm">
<label for="confirmDelete">Type the full task name to confirm:</label>
<input type="text" id="confirmDelete" required>

<div class="modal-actions">
<button type="button" id="cancelDelete">CANCEL</button>
<button type="submit" id="confirmDeleteBtn">DELETE</button>
</div>
</form>
</div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
