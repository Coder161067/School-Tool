<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tasks</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="title">TASK_MANAGER</div>

<nav>
<a href="index.html">DASHBOARD</a>
<a href="tasks.html">TASKS</a>
<a href="calendar.html">CALENDAR</a>
<a href="stats.html">STATS</a>
</nav>

<div class="controls">
<button id="themeToggle">THEME</button>
<div id="clock"></div>
</div>

</header>

<main>

<section class="add-task">

<input id="taskInput" placeholder="enter task">
<select id="subject">
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>History</option>
</select>

<button id="addTask">ADD</button>

</section>

<section id="taskList" class="tasks"></section>

<!-- Edit Task Modal -->
<div id="editModal" class="modal">
<div class="modal-content">
<h2>Edit Task</h2>
<form id="editForm">
<label for="editName">Task Name:</label>
<input type="text" id="editName" required>

<label for="editDescription">Description (optional):</label>
<textarea id="editDescription" rows="3"></textarea>

<label for="editDeadline">Deadline:</label>
<input type="datetime-local" id="editDeadline" required>

<div class="form-info">
<small>Start date & time will be automatically added</small>
</div>

<div class="modal-actions">
<button type="button" id="cancelEdit">CANCEL</button>
<button type="submit">SAVE CHANGES</button>
</div>
</form>
</div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
