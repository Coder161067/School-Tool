<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Manager - Stats</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="ical-parser.js"></script>
</head>

<body>

<header>

<div class="title">STATISTICS</div>

<nav>
<a href="index.html">DASHBOARD</a>
<a href="tasks.html">TASKS</a>
<a href="calendar.html">CALENDAR</a>
<a href="stats.html">STATS</a>
</nav>

<div class="controls">
<button class="gear-icon" id="gearIcon"><span class="material-symbols-outlined">settings</span></button>
<div id="clock"></div>
</div>

<!-- Settings Popout Menu -->
<div id="settingsMenu" class="settings-menu">
<div class="settings-content">

<!-- Main Settings View -->
<div id="mainSettingsView" class="settings-view">
<h3>Settings</h3>
<button id="themeToggle">CHANGE THEME</button>
<button id="subjectsManagementBtn">SUBJECTS MANAGEMENT</button>
</div>

<!-- Subjects Management View -->
<div id="subjectsView" class="settings-view hidden">
<div class="settings-header">
<button class="back-arrow" id="backToMain"><span class="material-symbols-outlined">arrow_back</span></button>
<h3>Subjects</h3>
</div>
<div class="add-subject">
<input type="text" id="newSubject" placeholder="New subject name">
<button id="addSubject">ADD</button>
</div>
<div id="subjectList" class="subject-list"></div>
</div>

</div>
</div>

</header>

<main>

<div class="stats-grid" id="statsGrid">
<!-- Stats panels will be dynamically generated here -->
</div>

</main>

<script src="script.js"></script>

</body>
</html>
