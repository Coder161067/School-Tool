<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Manager</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>

<header>

<div class="title">SCHOOL_MANAGER</div>

<nav>
<a href="index.html">DASHBOARD</a>
<a href="tasks.html">TASKS</a>
<a href="calendar.html">CALENDAR</a>
<a href="stats.html">STATS</a>
</nav>

<div class="controls">
<button class="gear-icon" id="gearIcon"></button>
<div id="clock"></div>
</div>

<!-- Settings Popout Menu -->
<div id="settingsMenu" class="settings-menu">
<div class="settings-content">

<!-- Main Settings View -->
<div id="mainSettingsView" class="settings-view">
<h3>Settings</h3>
<button id="themeToggle">CHANGE THEME</button>
<button id="subjectsManagementBtn">SUBJECTS MANAGEMENT</button>
</div>

<!-- Subjects Management View -->
<div id="subjectsView" class="settings-view hidden">
<div class="settings-header">
<button class="back-arrow" id="backToMain">◀</button>
<h3>Subjects</h3>
</div>
<div class="add-subject">
<input type="text" id="newSubject" placeholder="New subject name">
<button id="addSubject">ADD</button>
</div>
<div id="subjectList" class="subject-list"></div>
</div>

</div>
</div>

</header>


<main>

<section class="dashboard-grid">

<div class="panel">
<h3>ACTIVE TASKS</h3>
<div id="taskCount">0</div>
</div>

<div class="panel">
<h3>COMPLETED</h3>
<div id="completedCount">0</div>
</div>

<div class="panel">
<h3>UPCOMING DUE DATES</h3>
<div>3</div>
</div>

</section>

</main>

<script src="script.js"></script>
</body>
</html>
