<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>School Manager - Tasks</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="ical-parser.js"></script>
</head>

<body>

<header>

<div class="title">TASK_MANAGER</div>

<nav>
<a href="index.html">DASHBOARD</a>
<a href="tasks.html">TASKS</a>
<a href="calendar.html">CALENDAR</a>
<a href="stats.html">STATS</a>
</nav>

<div class="controls">
<button class="gear-icon" id="gearIcon"><span class="material-symbols-outlined">settings</span></button>
<div id="clock"></div>
</div>

<!-- Settings Popout Menu -->
<div id="settingsMenu" class="settings-menu">
<div class="settings-content">

<!-- Main Settings View -->
<div id="mainSettingsView" class="settings-view">
<h3>Settings</h3>
<button id="themeToggle">CHANGE THEME</button>
<button id="subjectsManagementBtn">SUBJECTS MANAGEMENT</button>
</div>

<!-- Subjects Management View -->
<div id="subjectsView" class="settings-view hidden">
<div class="settings-header">
<button class="back-arrow" id="backToMain"><span class="material-symbols-outlined">arrow_back</span></button>
<h3>Subjects</h3>
</div>
<div class="add-subject">
<input type="text" id="newSubject" placeholder="New subject name">
<button id="addSubject">ADD</button>
</div>
<div id="subjectList" class="subject-list"></div>
</div>

</div>
</div>

</header>

<main>

<section class="add-task">
<button id="addTask">ADD TASK</button>
</section>

<section id="taskList" class="tasks"></section>

<!-- Edit Task Modal -->
<div id="editModal" class="modal">
<div class="modal-content">
<h2>Edit Task</h2>
<form id="editForm">
<label for="editName">Task Name:</label>
<input type="text" id="editName">

<label for="editSubject">Subject:</label>
<select id="editSubject">
<option>Math</option>
<option>Science</option>
<option>English</option>
<option>History</option>
<option>General</option>
</select>

<label for="editDescription">Description (optional):</label>
<textarea id="editDescription" rows="3"></textarea>

<label for="editDeadline">Due Date:</label>
<div class="deadline-inputs">
<input type="date" id="editDeadlineDate" required>
<input type="time" id="editDeadlineTime" required>
</div>

<div class="advanced-toggle">
<span class="arrow">▶</span>
<span>Advanced Options</span>
</div>

<div class="advanced-section" id="advancedSection">
<label for="editStartDate">Start Date:</label>
<div class="deadline-inputs">
<input type="date" id="editStartDateDate">
<input type="time" id="editStartTime">
</div>
</div>

<div class="modal-actions">
<button type="button" id="cancelEdit">CANCEL</button>
<button type="submit">SAVE CHANGES</button>
</div>
</form>
</div>
</div>

<!-- Unnamed Task Modal -->
<div id="unnamedTaskModal" class="modal">
<div class="modal-content">
<h2>Unnamed Task</h2>
<p>This task has no name.</p>
<p>Would you like to add a name or discard this task?</p>
<div class="modal-actions">
<button type="button" id="addNameBtn">ADD NAME</button>
<button type="button" id="discardTaskBtn">DISCARD TASK</button>
</div>
</div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
<div class="modal-content">
<h2>Delete Task</h2>
<p>Are you sure you want to delete this task?</p>
<p><strong id="deleteTaskName"></strong></p>
<form id="deleteForm">
<label for="confirmDelete">Type the full task name to confirm:</label>
<input type="text" id="confirmDelete" required>

<div class="modal-actions">
<button type="button" id="cancelDelete">CANCEL</button>
<button type="submit" id="confirmDeleteBtn">DELETE</button>
</div>
</form>
</div>
</div>

</main>

<script src="script.js"></script>

</body>
</html>
